<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Circular Bracket</title>
<meta name="description" content="Auto-updating circular bracket for the 2026 World Cup knockout stage. Static, client-side, no backend." />
<style>
  :root{
    --bg:#f2ede1;
    --ink:#1c1b18;
    --line:#2a2823;
    --muted:#9a948a;
    --gold:#c8a24a;
    --bronze:#b08d57;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;
  }
  header{
    text-align:center;
    padding:18px 12px 4px;
  }
  header h1{
    margin:0;
    font-size:clamp(20px,3.4vw,34px);
    font-weight:800;
    letter-spacing:.2px;
  }
  header .sub{
    margin-top:4px;color:var(--muted);font-size:13px;
  }
  /* Square responsive stage that holds the SVG (lines/dots/trophy) and the flag overlay */
  .stage{
    position:relative;
    width:min(94vw, 86vh, 920px);
    aspect-ratio:1/1;
    margin:6px auto 4px;
  }
  .stage svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .conn{fill:none;stroke:var(--line);stroke-width:2.2;stroke-linejoin:round;stroke-linecap:round}
  .center-line{stroke:var(--line);stroke-width:2.2}

  /* Flags are HTML imgs positioned over the SVG so circular clipping is trivial */
  .flag{
    position:absolute;
    transform:translate(-50%,-50%);
    border-radius:50%;
    object-fit:cover;
    background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.18);
    border:2px solid #fff;
    aspect-ratio:1/1;
    cursor:default;
    transition:width .25s ease, height .25s ease;
  }
  .flag.r0{width:6.6%}
  .flag.r1{width:5.7%}
  .flag.r2{width:5.2%}
  .flag.r3{width:5.0%}
  .flag.r4{width:5.0%}
  .flag.champ{width:9%;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold),0 2px 8px rgba(0,0,0,.3)}
  /* Undetermined future match: small visible dot with a larger invisible hit area,
     so it's easy to hover/tap while staying visually light. Carries the schedule tooltip. */
  .flag.dot{width:3%;background:radial-gradient(circle, var(--line) 34%, transparent 37%);
    border-color:transparent;box-shadow:none;cursor:help}
  .flag.eliminated{filter:grayscale(1)}
  .flag.win{border-color:var(--gold)}
  /* Third-place play-off: a small pairing below the final. Bronze border on the winner. */
  .flag.tp{width:4.4%}
  .flag.tp.win{border-color:var(--bronze);box-shadow:0 0 0 2px var(--bronze),0 1px 4px rgba(0,0,0,.25)}
  .tp-label{fill:var(--muted);font-size:21px;font-weight:700;letter-spacing:1.6px;text-anchor:middle;font-family:inherit}
  .flag.pop{animation:pop .55s cubic-bezier(.2,1.5,.4,1)}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(.1);opacity:0}60%{transform:translate(-50%,-50%) scale(1.18)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}

  /* Custom hover/tap tooltip showing the match score */
  .tooltip{
    position:fixed;z-index:50;pointer-events:none;
    background:#1c1b18;color:#f2ede1;
    padding:7px 12px;border-radius:10px;
    font-size:13px;line-height:1.35;text-align:center;white-space:nowrap;
    box-shadow:0 6px 18px rgba(0,0,0,.30);
    opacity:0;transform:translate(-50%,-100%) translateY(-6px) scale(.96);
    transition:opacity .12s ease, transform .12s ease;
  }
  .tooltip.on{opacity:1;transform:translate(-50%,-100%) translateY(-10px) scale(1)}
  .tooltip::after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%) rotate(45deg);
    width:10px;height:10px;background:#1c1b18;border-radius:2px}
  /* flipped below the flag (for flags near the top edge) */
  .tooltip.below{transform:translate(-50%,0) translateY(6px) scale(.96)}
  .tooltip.below.on{transform:translate(-50%,0) translateY(10px) scale(1)}
  .tooltip.below::after{top:-5px;bottom:auto}
  .tooltip .tt-round{font-size:10px;letter-spacing:.7px;text-transform:uppercase;font-weight:700;color:var(--gold)}
  .tooltip .tt-teams{font-weight:600;margin-top:2px}
  .tooltip .tt-score{margin-top:3px;font-size:16px;font-weight:800}
  .tooltip .tt-score.pending{font-size:12px;font-weight:500;color:#cfc9bd}

  /* Schedule table: knockout matches yesterday → tomorrow, grouped by local day */
  .schedule{
    width:min(94vw, 86vh, 920px);
    margin:2px auto 12px;
    display:flex;flex-direction:column;gap:12px;
  }
  .schedule[hidden]{display:none}
  .sched-day-h{
    font-size:10px;letter-spacing:.7px;text-transform:uppercase;font-weight:700;
    color:var(--gold);margin-bottom:5px;
  }
  .sched-date{color:var(--muted);text-transform:none;letter-spacing:0;font-weight:600}
  .sched-row{
    display:flex;align-items:center;gap:10px;
    padding:7px 11px;border-radius:10px;
    background:rgba(28,27,24,.045);
    font-size:14px;
  }
  .sched-row + .sched-row{margin-top:5px}
  .sched-round{
    flex:0 0 auto;min-width:30px;
    font-size:10px;font-weight:700;letter-spacing:.5px;
    color:var(--muted);text-transform:uppercase;
  }
  .sched-teams{display:flex;align-items:center;gap:6px;flex:1 1 auto;flex-wrap:wrap}
  .sched-flag{
    width:20px;height:20px;border-radius:50%;object-fit:cover;background:#fff;
    box-shadow:0 1px 2px rgba(0,0,0,.15);flex:0 0 auto;
  }
  .sched-tbd{background:#cfc9bd;box-shadow:none}
  .sched-name{font-weight:600}
  .sched-name.tbd{color:var(--muted);font-weight:500}
  .sched-sep{color:var(--muted);font-weight:700;margin:0 2px;white-space:nowrap}
  .sched-meta{flex:0 0 auto;display:flex;align-items:center;gap:7px;color:var(--muted);font-weight:600}
  .sched-time{font-variant-numeric:tabular-nums;white-space:nowrap}
  .sched-live{
    font-size:9px;font-weight:800;letter-spacing:.6px;color:#fff;
    background:#c0563c;padding:2px 6px;border-radius:6px;text-transform:uppercase;
    animation:livepulse 1.6s ease-in-out infinite;
  }
  @keyframes livepulse{0%,100%{opacity:1}50%{opacity:.45}}
  .sched-row.live{background:rgba(192,86,60,.10)}

  footer{
    color:var(--muted);font-size:12.5px;text-align:center;
    padding:2px 12px 22px;line-height:1.5;
  }
  footer a{color:var(--muted)}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);vertical-align:middle;margin-right:5px}
  .status-dot.ok{background:#4a9d5b}
  .status-dot.err{background:#c0563c}
</style>
</head>
<body>
  <header>
    <h1>World Cup 2026</h1>
    <div class="sub">Knockout bracket · fills in as matches finish</div>
  </header>

  <div class="stage" id="stage" aria-label="World Cup 2026 knockout bracket"></div>

  <section class="schedule" id="schedule" aria-label="Matches from yesterday to tomorrow" hidden></section>

  <footer>
    <div><span class="status-dot" id="statusDot"></span><span id="status">Loading…</span></div>
    <div style="margin-top:4px">Data: openfootball · Flags: flagcdn · Static page, updates in your browser</div>
  </footer>

<script>
"use strict";
/* ============================================================================
   World Cup 2026 — Auto-updating circular bracket
   Pure static, client-side. See README / design doc for architecture.

   Pipeline (design §8):
     fetchResults()  -> raw matches (ONLY source-specific code)
     normalize()     -> map num -> match
     buildModel()    -> static skeleton + results overlay (winners propagate in)
     layout()        -> polar (radius, angle) per node, bottom-up angle = mean
     render()        -> SVG lines/dots/trophy + HTML circular flags, diff-animated
============================================================================ */

/* ----------------------------- Config -------------------------------------- */
const FEED_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
const POLL_MS  = 120000; // 2 min (design §9 — source lags anyway)

/* Team name -> ISO 3166-1 alpha-2 (flagcdn slug). The only hand-authored data.
   Must match the exact strings the feed uses. */
const ISO = {
  "South Africa":"za","Canada":"ca","Germany":"de","Paraguay":"py",
  "Netherlands":"nl","Morocco":"ma","Brazil":"br","Japan":"jp",
  "France":"fr","Sweden":"se","Ivory Coast":"ci","Norway":"no",
  "Mexico":"mx","Ecuador":"ec","England":"gb-eng","DR Congo":"cd",
  "USA":"us","Bosnia & Herzegovina":"ba","Belgium":"be","Senegal":"sn",
  "Portugal":"pt","Croatia":"hr","Spain":"es","Austria":"at",
  "Switzerland":"ch","Algeria":"dz","Argentina":"ar","Cape Verde":"cv",
  "Colombia":"co","Ghana":"gh","Australia":"au","Egypt":"eg",
  // a few likely-alternates so a feed rename won't blank a flag
  "United States":"us","Côte d'Ivoire":"ci","Cabo Verde":"cv",
  "IR Iran":"ir","Iran":"ir","Korea Republic":"kr","South Korea":"kr",
  "USA ":"us"
};
function flagURL(team, w){ // w = flagcdn width bucket
  const iso = ISO[team];
  return iso ? `https://flagcdn.com/${w}/${iso}.png` : "";
}

/* ---- Static bracket skeleton (design §5): match num -> [childNum, childNum].
   Fixed and known in advance; results only overlay on top. R32 (73–88) are
   the leaves whose two participants are the team flags. (Match 103, the
   third-place play-off, is intentionally outside the radial tree.) */
const ROOT = 104;
const CHILDREN = {
  89:[74,77], 90:[73,75], 91:[76,78], 92:[79,80],
  93:[83,84], 94:[81,82], 95:[86,88], 96:[85,87],
  97:[89,90], 98:[93,94], 99:[91,92], 100:[95,96],
  101:[97,98], 102:[99,100],
  104:[101,102]
};
const R32_NUMS = [73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88];
const R32SET = new Set(R32_NUMS);

/* Reverse of CHILDREN: match num -> its parent (the next-round match its winner
   advances into). R32 leaves point at their R16 match; the Final (ROOT) has no
   parent. Built once from CHILDREN so the two never drift apart. */
const PARENT = {};
for (const [p, kids] of Object.entries(CHILDREN)){
  for (const c of kids) PARENT[c] = +p;
}

/* Ring level: R32 match node = 1 … Final = 5 (center). Flags live at level 0. */
function levelOf(num){
  if (R32SET.has(num)) return 1;
  if (num>=89 && num<=96) return 2;
  if (num>=97 && num<=100) return 3;
  if (num>=101 && num<=102) return 4;
  return 5; // final
}

/* --------------------------- Geometry (design §6) -------------------------- */
const CX = 500, CY = 500;
// radius per ring level (viewBox units). 0 = outer flags … 5 = center.
const RADIUS = {0:430, 1:344, 2:260, 3:178, 4:98, 5:0};
const STEP = 360/32; // angular slot per outer flag

// 32 outer flags in tree DFS order (team1-subtree first). This reproduces the
// reference layout: left semicircle = first 16, right semicircle = last 16.
function dfsFlags(num){
  if (R32SET.has(num)) return [{num,slot:0},{num,slot:1}];
  const [a,b] = CHILDREN[num];
  return dfsFlags(a).concat(dfsFlags(b));
}
const FLAG_ORDER = dfsFlags(ROOT); // length 32

// flag index -> angle (deg, measured from 12 o'clock, clockwise positive).
function flagAngle(i){
  return (i<16) ? -(i+0.5)*STEP : ((i-16)+0.5)*STEP;
}
// match num -> angle (deg). Leaf = mean of its two flags; inner = mean of children.
const _angleMemo = {};
function angleOf(num){
  if (num in _angleMemo) return _angleMemo[num];
  let a;
  if (R32SET.has(num)){
    const idx = [];
    FLAG_ORDER.forEach((f,i)=>{ if(f.num===num) idx.push(i); });
    a = (flagAngle(idx[0]) + flagAngle(idx[1]))/2;
  } else {
    const [c1,c2] = CHILDREN[num];
    a = (angleOf(c1) + angleOf(c2))/2;
  }
  return (_angleMemo[num] = a);
}
// polar (radius, angleDeg) -> screen point
function pt(radius, angDeg){
  const r = angDeg*Math.PI/180;
  return [CX + radius*Math.sin(r), CY - radius*Math.cos(r)];
}

/* --------------------------- Data adapter (design §8) --------------------- */
async function fetchResults(){
  const res = await fetch(FEED_URL, {cache:"no-store"});
  if (!res.ok) throw new Error("HTTP "+res.status);
  const data = await res.json();
  return data.matches || [];
}
// num -> raw match
function normalize(matches){
  const map = {};
  for (const m of matches){ if (m && m.num!=null) map[m.num] = m; }
  return map;
}

// Winner index (0=team1,1=team2) from a score, precedence p -> et -> ft. null if undecided.
function winnerIndex(score){
  if (!score) return null;
  const s = score.p || score.et || score.ft;
  if (!s || s.length<2 || s[0]===s[1]) return null;
  return s[0] > s[1] ? 0 : 1;
}
function scoreLabel(score){
  if (!score) return "";
  if (score.p){
    const base = score.et || score.ft || score.p;
    return `${base[0]}–${base[1]} (${score.p[0]}–${score.p[1]} pens)`;
  }
  if (score.et) return `${score.et[0]}–${score.et[1]} a.e.t.`;
  if (score.ft) return `${score.ft[0]}–${score.ft[1]}`;
  return "";
}

/* Build the resolved model: for every node compute its two participants and its
   winner. Participants of an inner node = winners of its children (propagated
   inward); a missing side stays null (TBD). */
function buildModel(feed){
  const node = {}; // num -> {participants:[t1,t2|null], winner:string|null, score, label}
  const _w = {};
  function participants(num){
    if (R32SET.has(num)){
      const m = feed[num] || {};
      return [m.team1 || null, m.team2 || null];
    }
    const [c1,c2] = CHILDREN[num];
    return [winner(c1), winner(c2)];
  }
  function winner(num){
    if (num in _w) return _w[num];
    const p = participants(num);
    const sc = (feed[num]||{}).score;
    const idx = winnerIndex(sc);
    let w = null;
    if (idx!=null && p[idx]) w = p[idx];
    return (_w[num] = w);
  }
  // The team that lost a resolved match (null while undecided).
  function loser(num){
    const w = winner(num);
    if (!w) return null;
    const p = participants(num);
    return p[0]===w ? p[1] : p[0];
  }
  for (const numStr of [...R32_NUMS, 89,90,91,92,93,94,95,96,97,98,99,100,101,102,104]){
    const num = +numStr;
    const p = participants(num);
    const m = feed[num] || {};
    const sc = m.score;
    node[num] = { participants:p, winner:winner(num), score:sc, label:scoreLabel(sc),
                  date:m.date||"", time:m.time||"" };
  }
  // Third-place play-off (num 103): sits outside the radial tree. The feed labels
  // its sides "L101"/"L102" (semi-final losers), so resolve the real teams ourselves;
  // the score's winner index then maps 0->loser(101), 1->loser(102).
  {
    const p = [loser(101), loser(102)];
    const m = feed[103] || {};
    const sc = m.score;
    const idx = winnerIndex(sc);
    node[103] = { participants:p, winner:(idx!=null && p[idx]) ? p[idx] : null,
                  score:sc, label:scoreLabel(sc), date:m.date||"", time:m.time||"" };
  }
  return node;
}

/* ------------------------------ Rendering --------------------------------- */
const stage = document.getElementById("stage");
let prevWinners = {}; // num -> winner team, for diff/pop animation

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
// Feed gives venue-local time with an embedded offset ("HH:MM UTC±H"); rebuild a
// real instant so callers can render it in the viewer's own time zone. null if the
// match has no date, or date/time don't match the expected format.
function matchInstant(node){
  if (!node || !node.date) return null;
  const dm = node.date.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  const tm = node.time && node.time.match(/^(\d{1,2}):(\d{2})\s*UTC([+-]\d{1,2})(?::?(\d{2}))?$/);
  if (!dm || !tm) return null;
  const [, hh, mm, offH, offM] = tm;
  const sign = offH[0];
  const absH = String(Math.abs(+offH)).padStart(2,"0");
  const d = new Date(`${node.date}T${hh.padStart(2,"0")}:${mm}:00${sign}${absH}:${offM||"00"}`);
  return isNaN(d) ? null : d;
}
function kickoff(node){ // "2026-06-28" + "12:00 UTC-7" -> local time, e.g. "Sun, 28 Jun, 22:00 GMT+3"
  if (!node.date) return "Not played yet";
  const d = matchInstant(node);
  if (d) return d.toLocaleString([], {
    weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit", timeZoneName:"short"
  });
  // Fallback: unexpected format -> keep the original verbatim display.
  const dm = node.date.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  const day = dm ? `${+dm[3]} ${MONTHS[+dm[2]-1]}` : node.date;
  return node.time ? `${day} · ${node.time}` : day;
}
// tooltip fields for a match node (same match backs both its outer flags and its winner flag)
function tipFor(model, num){
  const n = model[num];
  const teams = `${n.participants[0]||"TBD"} vs ${n.participants[1]||"TBD"}`;
  return { round:roundName(num), teams, score:n.label, when:n.label?"":kickoff(n) };
}

function connectorPath(num){
  // child ring radius (outer) and this node's radius (inner)
  const lvl = levelOf(num);
  const Rc = RADIUS[lvl-1];
  const Rp = RADIUS[lvl];
  const [c1,c2] = R32SET.has(num)
    ? [{ang:childFlagAngle(num,0)},{ang:childFlagAngle(num,1)}]
    : [{ang:angleOf(CHILDREN[num][0])},{ang:angleOf(CHILDREN[num][1])}];
  const ap = angleOf(num);
  const A1 = pt(Rp, c1.ang), A2 = pt(Rp, c2.ang);
  const C1 = pt(Rc, c1.ang), C2 = pt(Rc, c2.ang);
  const P  = pt(Rp, ap);
  // quadratic control so the curve passes exactly through the parent node P
  const ctrl = [2*P[0] - 0.5*(A1[0]+A2[0]), 2*P[1] - 0.5*(A1[1]+A2[1])];
  return `M${C1[0]} ${C1[1]} L${A1[0]} ${A1[1]} Q${ctrl[0]} ${ctrl[1]} ${A2[0]} ${A2[1]} L${C2[0]} ${C2[1]}`;
}
// angle of one of a R32 node's two outer flags (slot 0/1)
function childFlagAngle(num, slot){
  let n=0, target=-1;
  for (let i=0;i<FLAG_ORDER.length;i++){
    if (FLAG_ORDER[i].num===num){ if (FLAG_ORDER[i].slot===slot){ target=i; break; } }
  }
  return flagAngle(target);
}

function trophySVG(){
  // simple trophy glyph centered at (CX,CY)
  return `<g transform="translate(${CX},${CY})" fill="var(--line)">
    <path d="M-16,-26 h32 v8 a16,18 0 0 1 -32,0 z" />
    <path d="M-22,-24 a8,8 0 0 0 8,8 v-4 a4,4 0 0 1 -4,-4 z" />
    <path d="M22,-24 a8,8 0 0 1 -8,8 v-4 a4,4 0 0 0 4,-4 z" />
    <rect x="-4" y="-6" width="8" height="12"/>
    <rect x="-12" y="6" width="24" height="5" rx="2"/>
    <rect x="-16" y="11" width="32" height="6" rx="2"/>
  </g>`;
}

function render(model){
  const newWinners = {};
  const flags = []; // {x,y,team,cls,title}

  // 32 outer flags (always shown)
  FLAG_ORDER.forEach((f,i)=>{
    const team = (model[f.num].participants[f.slot]) || "";
    if (!team) return;
    const [x,y] = pt(RADIUS[0], flagAngle(i));
    const win = model[f.num].winner;
    const elim = win && win!==team; // this team lost its R32 match
    flags.push({x,y,team,cls:"r0"+(elim?" eliminated":(win===team?" win":"")),
                tip:tipFor(model,f.num)});
  });

  // Build connectors + dots/winner-flags for every match node
  let conns = "";
  const nodeNums = [...R32_NUMS, 89,90,91,92,93,94,95,96,97,98,99,100,101,102,104];
  for (const num of nodeNums){
    const lvl = levelOf(num);
    if (lvl<=4) conns += `<path class="conn" d="${connectorPath(num)}"/>`;
    const ang = angleOf(num);
    if (num===ROOT) continue; // final handled at center
    const [x,y] = pt(RADIUS[lvl], ang);
    const w = model[num].winner;
    if (w){
      newWinners[num] = w;
      const pop = (prevWinners[num]!==w) ? " pop" : "";
      // A winner flag sits on the way toward the center, so its tooltip describes
      // where the team goes NEXT (result if played, otherwise the schedule) rather
      // than the match it already won. The match just won is still on the team's
      // outer flag. PARENT[num] is the next-round match; fall back to num if absent.
      const nextNum = PARENT[num];
      flags.push({x,y,team:w,cls:`r${lvl}${pop}`,
                  tip: nextNum!=null ? tipFor(model,nextNum) : tipFor(model,num)});
    } else {
      // No team yet: render a small hoverable dot instead of a winner flag, so the
      // match's schedule is reachable even before either participant is known. An
      // empty team routes through the neutral-placeholder branch below, carrying the
      // same data-round/teams/when the tooltip system reads for real flags.
      flags.push({x,y,team:"",cls:"dot",tip:tipFor(model,num)});
    }
  }

  // Final / center
  const finalNode = model[ROOT];
  const sf1 = pt(RADIUS[4], angleOf(101)), sf2 = pt(RADIUS[4], angleOf(102));
  let center = `<line class="center-line" x1="${CX}" y1="${CY}" x2="${sf1[0]}" y2="${sf1[1]}"/>
                <line class="center-line" x1="${CX}" y1="${CY}" x2="${sf2[0]}" y2="${sf2[1]}"/>`;
  let champFlag = null;
  if (finalNode.winner){
    newWinners[ROOT] = finalNode.winner;
    const pop = (prevWinners[ROOT]!==finalNode.winner) ? " pop" : "";
    const t = tipFor(model,ROOT); t.round = "Champion";
    champFlag = {x:CX,y:CY,team:finalNode.winner,cls:`champ${pop}`,tip:t};
  } else {
    center += trophySVG();
  }

  // Third-place play-off (num 103): a small pairing directly below the final. The
  // bottom of the tree is empty (both semis open upward), so it slots in cleanly.
  // Winner gets a bronze border; the other side greys out; unresolved sides are dots.
  const tp = model[103];
  const TPY = CY + 150, TPDX = 60;
  const tpPos = [[CX - TPDX, TPY], [CX + TPDX, TPY]];
  center += `<line class="conn" x1="${tpPos[0][0]}" y1="${TPY}" x2="${tpPos[1][0]}" y2="${TPY}"/>`+
            `<text class="tp-label" x="${CX}" y="${TPY + 48}">3RD PLACE</text>`;
  const tpTip = tipFor(model, 103);
  tp.participants.forEach((team, i)=>{
    const [x,y] = tpPos[i];
    if (team){
      const isWin = tp.winner === team;
      const pop = (isWin && prevWinners[103] !== team) ? " pop" : "";
      if (isWin) newWinners[103] = team;
      flags.push({x, y, team, cls:`tp ${isWin?"win":"eliminated"}${pop}`, tip:tpTip});
    } else {
      flags.push({x, y, team:"", cls:"dot", tip:tpTip});
    }
  });

  // Assemble SVG (lines + trophy) then the flag overlay (flags include future-match dots)
  let html = `<svg viewBox="0 0 1000 1000" role="img">${conns}${center}</svg>`;
  const allFlags = champFlag ? flags.concat([champFlag]) : flags;
  for (const fl of allFlags){
    const w = fl.cls.indexOf("champ")>=0 ? "w320" : "w160";
    const src = flagURL(fl.team, w);
    const left = (fl.x/1000*100).toFixed(3);
    const top  = (fl.y/1000*100).toFixed(3);
    const t = fl.tip || {round:"",teams:fl.team,score:"",when:""};
    const data = `data-round="${escapeAttr(t.round)}" data-teams="${escapeAttr(t.teams)}" `+
                 `data-score="${escapeAttr(t.score||"")}" data-when="${escapeAttr(t.when||"")}"`;
    if (fl.cls.indexOf("dot")>=0){
      // future match with no team yet: line-colored dot (CSS), tooltip via data-*
      html += `<div class="flag ${fl.cls}" ${data} style="left:${left}%;top:${top}%"></div>`;
    } else if (src){
      // on image error, fall back to a neutral circle so the bracket never gaps
      html += `<img class="flag ${fl.cls}" src="${src}" alt="${fl.team}" ${data} loading="lazy"
                 style="left:${left}%;top:${top}%" onerror="this.removeAttribute('src');this.style.background='#cfc9bd'"/>`;
    } else {
      // unknown team string -> neutral placeholder so the bracket never blanks
      html += `<div class="flag ${fl.cls}" ${data} style="left:${left}%;top:${top}%;background:#cfc9bd"></div>`;
    }
  }
  stage.innerHTML = html;
  prevWinners = newWinners;
}

function roundName(num){
  if (num===103) return "Third place";
  const l = levelOf(num);
  return ["","Round of 32","Round of 16","Quarter-final","Semi-final","Final"][l];
}
function roundShort(num){
  if (num===103) return "3rd";
  return ["","R32","R16","QF","SF","F"][levelOf(num)];
}

/* ---- Schedule table: knockout matches in a rolling yesterday/today/tomorrow window,
   grouped by the viewer's local day. Played matches show the result; upcoming ones
   show the local kickoff time. Reuses the same model that backs the bracket. ---- */
const scheduleEl = document.getElementById("schedule");
// Late-night matches read as part of the previous evening's session, so the "day"
// boundary sits at 05:00 local, not midnight: a 02:00 kickoff counts as the night
// before. footballDay() maps any instant to the midnight of the day it belongs to.
const DAY_START_HOUR = 5;
function footballDay(d){
  const s = new Date(d.getTime());
  s.setHours(s.getHours() - DAY_START_HOUR);
  return new Date(s.getFullYear(), s.getMonth(), s.getDate());
}
function localDayKey(d){ // Date -> "YYYY-MM-DD" in the viewer's local zone
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function shortDate(d){ return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function schedTeam(team, flip){ // one side of a row: flag + name (flag trails when flip=true)
  const name = team
    ? `<span class="sched-name">${escapeHTML(team)}</span>`
    : `<span class="sched-name tbd">TBD</span>`;
  const src = team ? flagURL(team, "w40") : "";
  const flag = src
    ? `<img class="sched-flag" src="${src}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`
    : `<span class="sched-flag sched-tbd"></span>`;
  return flip ? name + flag : flag + name;
}
function renderSchedule(model){
  const now = new Date();
  const today = footballDay(now);
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  const tom  = new Date(today); tom.setDate(tom.getDate()+1);
  // football-day key -> bucket; anything outside these three days is ignored
  const byKey = {};
  const days = [
    {key:localDayKey(yest),  date:yest,  label:"Yesterday", rows:[]},
    {key:localDayKey(today), date:today, label:"Today",     rows:[]},
    {key:localDayKey(tom),   date:tom,   label:"Tomorrow",  rows:[]},
  ];
  days.forEach(d => byKey[d.key] = d);

  const nodeNums = [...R32_NUMS, 89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104];
  for (const num of nodeNums){
    const n = model[num];
    const inst = matchInstant(n);
    if (!inst) continue;
    const bucket = byKey[localDayKey(footballDay(inst))];
    if (!bucket) continue;
    bucket.rows.push({num, node:n, inst});
  }

  const active = days.filter(d => d.rows.length);
  if (!active.length){ scheduleEl.hidden = true; scheduleEl.innerHTML = ""; return; }

  const LIVE_MS = 180*60*1000; // kickoff → +3h window (regular + ET + pens) for the LIVE flag
  let html = "";
  for (const d of active){
    d.rows.sort((a,b)=> a.inst - b.inst); // earliest kickoff first within the day
    html += `<div class="sched-day"><div class="sched-day-h">${d.label} <span class="sched-date">· ${shortDate(d.date)}</span></div>`;
    for (const {num, node, inst} of d.rows){
      const played = !!node.label;
      // Feed has no live scores (git repo, lags), so LIVE is a clock-based guess:
      // kicked off, no final score yet, still inside the plausible match window.
      const live = !played && inst <= now && (now - inst) < LIVE_MS;
      const sep = played ? node.label : "—"; // score between teams once played, else a dash
      const timeStr = inst.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); // shown for every row
      html += `<div class="sched-row${live?" live":""}">`+
        `<span class="sched-round">${roundShort(num)}</span>`+
        `<span class="sched-teams">${schedTeam(node.participants[0], false)}`+
          `<span class="sched-sep">${escapeHTML(sep)}</span>`+
          `${schedTeam(node.participants[1], true)}</span>`+
        `<span class="sched-meta">`+
          (live ? `<span class="sched-live">LIVE</span>` : "")+
          `<span class="sched-time">${escapeHTML(timeStr)}</span>`+
        `</span>`+
      `</div>`;
    }
    html += `</div>`;
  }
  scheduleEl.innerHTML = html;
  scheduleEl.hidden = false;
}
function escapeAttr(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function escapeHTML(s){ return escapeAttr(s).replace(/>/g,"&gt;"); }

/* ---- Custom tooltip: hover on desktop, tap on touch (design §7 score display) ---- */
const tipEl = document.createElement("div");
tipEl.className = "tooltip";
document.body.appendChild(tipEl);

function showTip(el){
  const d = el.dataset;
  if (!d || !d.teams) return;
  const scoreHTML = d.score
    ? `<div class="tt-score">${escapeHTML(d.score)}</div>`
    : `<div class="tt-score pending">${escapeHTML(d.when || "Not played yet")}</div>`;
  tipEl.innerHTML =
    (d.round ? `<div class="tt-round">${escapeHTML(d.round)}</div>` : "") +
    `<div class="tt-teams">${escapeHTML(d.teams)}</div>` + scoreHTML;
  const r = el.getBoundingClientRect();
  const cx = Math.min(Math.max(r.left + r.width/2, 8), window.innerWidth - 8);
  const flip = r.top < 90; // near top edge -> show below the flag
  tipEl.classList.toggle("below", flip);
  tipEl.style.left = cx + "px";
  tipEl.style.top  = (flip ? r.bottom : r.top) + "px";
  tipEl.classList.add("on");
}
function hideTip(){ tipEl.classList.remove("on"); }

// hover (desktop)
stage.addEventListener("pointerover", e=>{
  const el = e.target.closest(".flag");
  if (el && e.pointerType!=="touch") showTip(el);
});
stage.addEventListener("pointerout", e=>{
  if (e.target.closest(".flag") && e.pointerType!=="touch") hideTip();
});
// tap (touch): toggle, and dismiss when tapping elsewhere
stage.addEventListener("click", e=>{
  const el = e.target.closest(".flag");
  if (el){ e.stopPropagation(); tipEl.classList.contains("on") ? hideTip() : showTip(el); }
});
document.addEventListener("click", ()=>hideTip());
window.addEventListener("scroll", hideTip, {passive:true});

/* ------------------------------- Update loop ------------------------------ */
const statusEl = document.getElementById("status");
const dotEl = document.getElementById("statusDot");
let lastGoodAt = null;

function stamp(ok, msg){
  dotEl.className = "status-dot " + (ok?"ok":"err");
  const t = lastGoodAt ? lastGoodAt.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "—";
  statusEl.textContent = (msg ? msg+" · " : "") + "updated " + t;
}

async function tick(){
  try{
    const raw = await fetchResults();
    const model = buildModel(normalize(raw));
    lastGoodAt = new Date();
    render(model);
    renderSchedule(model);
    stamp(true);
  }catch(err){
    // Never blank the bracket — keep last-good on screen, quiet retry (design §9)
    stamp(false, "offline, retrying");
    console.warn("fetch failed:", err);
  }
}

tick();
setInterval(tick, POLL_MS);
</script>
</body>
</html>
